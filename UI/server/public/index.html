<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Log Monitor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-group">
                <h1>ESP32 Telemetry Dashboard</h1>
                <p class="subtitle">UDP Port 54321</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" data-target="tab-main">Main Logs</button>
                <button class="tab-btn" data-target="tab-adc">ADC Chart</button>
                <button class="tab-btn" data-target="tab-motor">Motor Control</button>
            </div>

            <div class="status-indicator">
                <div id="status-dot" class="dot red"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </div>
        
        <div class="controls">
            <button id="btn-connect" class="btn primary">Connect</button>
            <button id="btn-disconnect" class="btn danger">Disconnect</button>
            <button id="btn-clear" class="btn secondary">Clear Log</button>
            
            <label class="toggle">
                <input type="checkbox" id="toggle-autoscroll" checked>
                <span>Auto-scroll (Main Tab)</span>
            </label>
        </div>

        <div class="content-area">
            <!-- Main Tab (Logs) -->
            <div id="tab-main" class="tab-content active">
                <div class="log-container" id="log-container">
                    <ul id="log-list"></ul>
                </div>
            </div>

            <!-- ADC Tab (Charts) -->
            <div id="tab-adc" class="tab-content">
                <div class="chart-container">
                    <canvas id="adc-chart"></canvas>
                </div>
            </div>

            <!-- Motor Tab -->
            <div id="tab-motor" class="tab-content">
                <div id="motor-container" class="motor-container">
                    <!-- Managed by motorManager.js -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
